<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Car Service Booking</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen flex items-center justify-center p-4 sm:p-8 bg-[radial-gradient(ellipse_at_top_right,_var(--tw-gradient-stops))] from-blue-950 via-slate-900 to-black">

    <div class="w-full max-w-2xl bg-slate-900/80 backdrop-blur-md rounded-3xl shadow-2xl border border-slate-800 overflow-hidden my-6">
        
        <div class="relative h-56 sm:h-64 w-full bg-slate-800 overflow-hidden">
           <div class="relative h-56 sm:h-64 w-full bg-slate-800 overflow-hidden">
            <img src="https://images.unsplash.com/photo-1617814076367-b759c7d7e738?auto=format&fit=crop&q=80&w=1200" alt="Modern Car Service Station" class="w-full h-full object-cover object-center opacity-85 hover:scale-105 transition-transform duration-700">
            <div class="absolute inset-0 bg-linear-to-t from-slate-950 via-slate-950/40 to-transparent"></div>
            
            <div class="absolute bottom-6 left-6 right-6">
                <span class="bg-blue-600/90 text-white text-[10px] font-bold uppercase tracking-widest px-2.5 py-1 rounded-md border border-blue-500/30">Elite Auto Care</span>
                <h1 class="text-2xl sm:text-3xl font-extrabold text-white tracking-tight mt-2 drop-shadow-md">Schedule a Premium Service</h1>
                <p class="text-slate-300 text-xs sm:text-sm mt-1 font-medium">Book expert mechanical maintenance and digital diagnostics</p>
            </div>
        </div>
        
        <form action="/" method="POST" class="p-6 sm:p-8 space-y-6">
            
            <div class="space-y-4">
                <div class="flex items-center gap-2 border-b border-slate-800 pb-2 mb-2">
                    <span class="text-blue-500 font-bold text-lg">01</span>
                    <h2 class="text-base font-semibold text-white uppercase tracking-wider">Vehicle Details</h2>
                </div>
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-[11px] font-semibold text-slate-400 uppercase tracking-wider mb-1.5">Car Model / Name</label>
                        <input type="text" name="car_name" required placeholder="e.g. Volkswagen Polo" class="w-full px-4 py-2.5 bg-slate-950/60 border border-slate-800 rounded-xl text-white placeholder-slate-600 focus:outline-hidden focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all text-sm">
                    </div>
                    <div>
                        <label class="block text-[11px] font-semibold text-slate-400 uppercase tracking-wider mb-1.5">Variant Specification</label>
                        <input type="text" name="variant" placeholder="e.g. 1.0 TSI" class="w-full px-4 py-2.5 bg-slate-950/60 border border-slate-800 rounded-xl text-white placeholder-slate-600 focus:outline-hidden focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all text-sm">
                    </div>
                    <div class="sm:col-span-2">
                        <label class="block text-[11px] font-semibold text-slate-400 uppercase tracking-wider mb-1.5">License Plate / Registration Number</label>
                        <input type="text" name="car_number" required placeholder="e.g. KL-07-CD-1234" class="w-full px-4 py-2.5 bg-slate-950/60 border border-slate-800 rounded-xl text-white placeholder-slate-600 focus:outline-hidden focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all text-sm uppercase tracking-wide font-mono">
                    </div>
                </div>
            </div>

            <div class="space-y-4">
                <div class="flex items-center gap-2 border-b border-slate-800 pb-2 mb-2">
                    <span class="text-blue-500 font-bold text-lg">02</span>
                    <h2 class="text-base font-semibold text-white uppercase tracking-wider">Customer Contact Context</h2>
                </div>
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <div class="sm:col-span-2">
                        <label class="block text-[11px] font-semibold text-slate-400 uppercase tracking-wider mb-1.5">Owner's Registered Full Name</label>
                        <input type="text" name="owner_name" required placeholder="Enter full name" class="w-full px-4 py-2.5 bg-slate-950/60 border border-slate-800 rounded-xl text-white placeholder-slate-600 focus:outline-hidden focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all text-sm">
                    </div>
                    <div>
                        <label class="block text-[11px] font-semibold text-slate-400 uppercase tracking-wider mb-1.5">Mobile Phone Number</label>
                        <input type="tel" name="phone" required placeholder="Primary contact number" class="w-full px-4 py-2.5 bg-slate-950/60 border border-slate-800 rounded-xl text-white placeholder-slate-600 focus:outline-hidden focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all text-sm">
                    </div>
                    <div>
                        <label class="block text-[11px] font-semibold text-slate-400 uppercase tracking-wider mb-1.5">Email Address</label>
                        <input type="email" name="email" placeholder="name@example.com" class="w-full px-4 py-2.5 bg-slate-950/60 border border-slate-800 rounded-xl text-white placeholder-slate-600 focus:outline-hidden focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all text-sm">
                    </div>
                    <div class="sm:col-span-2">
                        <label class="block text-[11px] font-semibold text-slate-400 uppercase tracking-wider mb-1.5">Communication / Billing Address</label>
                        <textarea name="address" rows="2" placeholder="Complete address detail..." class="w-full px-4 py-2.5 bg-slate-950/60 border border-slate-800 rounded-xl text-white placeholder-slate-600 focus:outline-hidden focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all text-sm resize-none"></textarea>
                    </div>
                </div>
            </div>

            <div class="space-y-4">
                <div class="flex items-center gap-2 border-b border-slate-800 pb-2 mb-2">
                    <span class="text-blue-500 font-bold text-lg">03</span>
                    <h2 class="text-base font-semibold text-white uppercase tracking-wider">Service Schedule Options</h2>
                </div>
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-[11px] font-semibold text-slate-400 uppercase tracking-wider mb-1.5">Preferred Intake Date</label>
                        <input type="date" name="booking_date" required class="w-full px-4 py-2.5 bg-slate-950/60 border border-slate-800 rounded-xl text-white focus:outline-hidden focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all text-sm [color-scheme:dark]">
                    </div>
                    <div>
                        <label class="block text-[11px] font-semibold text-slate-400 uppercase tracking-wider mb-1.5">Arrival Time Window</label>
                        <input type="time" name="booking_time" required class="w-full px-4 py-2.5 bg-slate-950/60 border border-slate-800 rounded-xl text-white focus:outline-hidden focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all text-sm [color-scheme:dark]">
                    </div>
                    <div>
                        <label class="block text-[11px] font-semibold text-slate-400 uppercase tracking-wider mb-1.5">Requested Collection Date</label>
                        <input type="date" name="expected_delivery" required class="w-full px-4 py-2.5 bg-slate-950/60 border border-slate-800 rounded-xl text-white focus:outline-hidden focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all text-sm [color-scheme:dark]">
                    </div>
                    <div>
                        <label class="block text-[11px] font-semibold text-slate-400 uppercase tracking-wider mb-1.5">Operational Service Type</label>
                        <div class="relative">
                            <select name="service_type" class="w-full px-4 py-2.5 bg-slate-950/60 border border-slate-800 rounded-xl text-white focus:outline-hidden focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all text-sm appearance-none cursor-pointer">
                                <option value="General Service">Periodic General Service</option>
                                <option value="Oil Change">Express Oil & Filter Change</option>
                                <option value="Water Wash">Full Body Deep Clean Wash</option>
                                <option value="Body Repair">Denting & Body Painting</option>
                            </select>
                        </div>
                    </div>
                </div>
            </div>

            <div class="pt-4">
                <button type="submit" class="w-full py-3 px-5 bg-linear-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 text-white font-semibold text-sm rounded-xl shadow-lg shadow-blue-500/20 active:scale-98 transition-all cursor-pointer text-center tracking-wide uppercase">
                    Confirm Appointment Schedule
                </button>
            </div>
        </form>
    </div>

</body>
</html>
